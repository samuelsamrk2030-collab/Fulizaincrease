<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Payment</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

h1 {
  text-align: center;
  color: green;
}

.box {
  background: #e8f5e9;
  padding: 10px;
  margin-bottom: 15px;
  border-left: 5px solid green;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: green;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Complete Payment</h1>

  <div class="box">
    <p>You selected: <strong>Ksh 5,000</strong></p>
    <p>Fee: Ksh 49</p>
  </div>

  <input type="text" id="phone" placeholder="Enter phone number">

  <button onclick="payNow()">Pay Now</button>
</div>

<script>
const selectedAmount = 5000; // ✅ MAIN AMOUNT (NOT FEE)

async function payNow() {
  const phone = document.getElementById("phone").value.trim();

  if (!phone) {
    alert("Enter phone number");
    return;
  }

  // ✅ CONVERT TO NUMBER (CRITICAL FIX)
  const amount = Number(selectedAmount);

  try {
    const res = await fetch("https://YOUR-BACKEND-URL/api/pay", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        phone: phone,
        amount: amount // ✅ correct
      })
    });

    const data = await res.json();

    if (res.ok) {
      alert("✅ STK Push Sent! Check your phone");
    } else {
      alert("❌ " + (data.error || "Payment failed"));
    }

  } catch (err) {
    alert("❌ Network error");
    console.error(err);
  }
}
</script>

</body>
</html>
